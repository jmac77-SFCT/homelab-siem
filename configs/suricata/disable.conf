# suricata-update disable list — homelab-siem
#
# Installed to /etc/suricata/disable.conf by install/02-install-suricata.sh.
# suricata-update reads it automatically and drops matching rules from the
# generated /var/lib/suricata/rules/suricata.rules.
#
# Why: this is a home network with no industrial/SCADA equipment. The ET Open
# ruleset ships DNP3 and Modbus rules that require app-layer parsers our lean
# suricata.yaml doesn't enable. Left in, they fail to load ("protocol dnp3
# cannot be used in a signature") and fail the `suricata -T` config test.
# We have no use for ICS protocol detection at home, so drop those rule files.
#
# Format: `group:<rule-file-name>` disables every rule from that file.
group:dnp3-events.rules
group:modbus-events.rules
