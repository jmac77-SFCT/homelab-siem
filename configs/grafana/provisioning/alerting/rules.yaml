# ============================================================================
# Grafana alert rule: fire when Suricata logs IDS alerts
#
# Every minute, count Suricata `alert` events in Loki over the last 5 minutes.
# If that count > 0, the rule fires and the notification policy sends it to
# Telegram.
#
# Three nodes (standard Grafana pattern):
#   A = Loki instant query: count of alert events in the last 5m
#   B = reduce A to a single number (last value)
#   C = threshold: fire when B > 0   <- this is the alert condition
# ============================================================================
apiVersion: 1

groups:
  - orgId: 1
    name: suricata
    folder: SIEM Alerts
    interval: 1m
    rules:
      - uid: suricata_alert_fired
        title: Suricata IDS alerts detected
        condition: C
        for: 0m
        # No data = no alerts seen = nothing wrong, so don't page.
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
        annotations:
          summary: 'Signature "{{ $labels.alert_signature }}" matched {{ $values.B.Value }}x involving {{ $labels.src_ip }} in the last hour'
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              # One series PER signature+source so each alert names the actual ET
              # rule and the device involved. Only medium/high severity
              # (alert.severity 1=high, 2=medium, 3=low/info) — ET Open fires
              # thousands of sev-3 info alerts/hour on normal traffic. 1h window
              # so brief gaps don't make it flap Firing<->NoData.
              expr: 'sum by (alert_signature, src_ip) (count_over_time({job="suricata", event_type="alert"} | json | alert_severity <= 2 [1h]))'
              queryType: instant
              instant: true
              range: false
              refId: A
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
