# ============================================================================
# Grafana alert rule: fire when Suricata logs IDS alerts
#
# Every minute, count Suricata `alert` events in Loki over the last 5 minutes.
# If that count > 0, the rule fires and the notification policy sends it to
# Telegram.
#
# Three nodes (standard Grafana pattern):
#   A = Loki instant query: count of alert events in the last 5m
#   B = reduce A to a single number (last value)
#   C = threshold: fire when B > 0   <- this is the alert condition
# ============================================================================
apiVersion: 1

groups:
  - orgId: 1
    name: suricata
    folder: SIEM Alerts
    interval: 1m
    rules:
      - uid: suricata_alert_fired
        title: Suricata IDS alerts detected
        condition: C
        for: 0m
        # No data = no alerts seen = nothing wrong, so don't page.
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
        annotations:
          summary: 'Signature "{{ $labels.alert_signature }}" matched {{ $values.B.Value }}x involving {{ $labels.device }} in the last hour'
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              # One series PER signature+source so each alert names the actual ET
              # rule and the device involved. Only medium/high severity
              # (alert.severity 1=high, 2=medium, 3=low/info) — ET Open fires
              # thousands of sev-3 info alerts/hour on normal traffic. 1h window
              # so brief gaps don't make it flap Firing<->NoData.
              expr: 'sum by (alert_signature, device) (count_over_time({job="suricata", event_type="alert"} | json | alert_severity <= 2 [1h]))'
              queryType: instant
              instant: true
              range: false
              refId: A
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C

      # ----------------------------------------------------------------------
      # Flagged-domain watch: alert when any device looks up an adult-content
      # domain (DNS). Names the device + domain. EDIT THE WATCHLIST in the
      # regex below — add/remove brand names in the (a|b|c) group; matching is
      # case-insensitive and catches subdomains (e.g. www.onlyfans.com).
      # NOTE: this ALERTS only. To BLOCK by category, use DNS filtering
      # (UniFi content filtering / NextDNS / Pi-hole with an adult blocklist).
      # ----------------------------------------------------------------------
      - uid: flagged_domain_lookup
        title: Flagged domain lookup
        condition: C
        for: 0m
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
          category: flagged-domain
        annotations:
          summary: '{{ $labels.device }} looked up flagged domain {{ $labels.rrname }}'
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              # Anchored full-match (LogQL label filters are anchored), so .* wraps
              # the alternation; (\.|^) + \. means the brand must be a whole DNS
              # label (matches onlyfans.com AND www.onlyfans.com, not notonlyfans.com).
              expr: 'sum by (device, rrname) (count_over_time({job="suricata", event_type="dns"} | json | rrname=~"(?i).*(\\.|^)(onlyfans|fansly|pornhub|xvideos|xnxx|xhamster|redtube|youporn|tube8|spankbang|eporner|txxx|hclips|porntrex|porn300|motherless|thumbzilla|youjizz|drtuber|nuvid|sunporno|vporn|4tube|pornhd|beeg|tnaflix|keezmovies|extremetube|spankwire|hdzog|upornia|gotporn|hotmovs|hqporner|daftsex|porntube|faphouse|cliphunter|slutload|chaturbate|stripchat|bongacams|livejasmin|cam4|myfreecams|camsoda|flirt4free|streamate|jerkmate|imlive|manyvids|brazzers|bangbros|realitykings|naughtyamerica|digitalplayground|mofos|twistys|blacked|tushy|evilangel|adulttime|teamskeet|mylf|fakehub|sexyhub|kink|metart|met-art|nubiles|dorcel|bellesa|frolicme|adultfriendfinder|ashleymadison|fling|pornpics|rule34|nhentai|hentaihaven|fakku|hanime|ehentai|e-hentai|literotica|ashemaletube|javhd|erome|scrolller|redgifs)\\..*" | rrname!~"(?i).*\\.local(domain)?.*" [10m]))'
              queryType: instant
              instant: true
              range: false
              refId: A
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
