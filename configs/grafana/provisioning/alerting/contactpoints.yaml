# ============================================================================
# Grafana contact point: Telegram
#
# Provisioned on startup (read-only in the UI). The ${...} values are
# interpolated by Grafana from the container's environment — docker-compose
# passes TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID through from .env. So no secrets
# live in this file or in git.
# ============================================================================
apiVersion: 1

contactPoints:
  - orgId: 1
    name: telegram
    receivers:
      - uid: telegram_suricata
        type: telegram
        settings:
          bottoken: ${TELEGRAM_BOT_TOKEN}
          # !!str forces a string type. Grafana strips the quotes when it
          # interpolates the env var, so a plain "${...}" arrives as a number
          # and fails validation (chatid must be a string). The !!str tag
          # survives interpolation and keeps it a string.
          chatid: !!str ${TELEGRAM_CHAT_ID}
          # Plain text (no parse_mode) to avoid HTML/Markdown escaping issues.
          message: |
            🚨 homelab-siem: {{ len .Alerts.Firing }} Suricata alert(s) firing
            {{ range .Alerts.Firing }}
            • {{ .Annotations.summary }}{{ end }}
        disableResolveMessage: false
